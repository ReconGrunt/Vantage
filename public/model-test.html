<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Airliner model test</title>
  <style>html,body{margin:0;height:100%;background:#0b1018;overflow:hidden}</style>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { buildAirliner, buildHelicopter, aircraftMaterial } from './js/plane-model.js';
    import { CATEGORY } from './js/classify.js';

    const renderer = new THREE.WebGLRenderer({ canvas: c, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1018);
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const cam = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 100);
    cam.position.set(1.6, 0.9, 1.9);
    cam.position.set(0.5, 3.2, 8.5);
    const controls = new OrbitControls(cam, renderer.domElement);

    scene.add(new THREE.AmbientLight(0x668, 0.7));
    const sun = new THREE.DirectionalLight(0xfff2e0, 2.2);
    sun.position.set(3, 5, 2); scene.add(sun);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.6);
    fill.position.set(-3, 1, -2); scene.add(fill);

    const planeGeo = buildAirliner();
    const heliGeo = buildHelicopter();
    const mat = (c) => aircraftMaterial({ color: c.color, emissive: c.emissive, emissiveIntensity: c.ei });

    // row: civ plane, law plane (blue), mil heli (green), ems heli (red)
    const specs = [
      [planeGeo, CATEGORY.civ, 2.2, -3.6],
      [planeGeo, CATEGORY.law, 2.2, -1.2],
      [heliGeo, CATEGORY.mil, 2.6, 1.4],
      [heliGeo, CATEGORY.ems, 2.6, 3.6],
    ];
    const meshes = specs.map(([g, c, s, x]) => {
      const m = new THREE.Mesh(g, mat(c));
      m.scale.setScalar(s); m.position.x = x;
      scene.add(m); return m;
    });
    scene.add(new THREE.GridHelper(12, 24, 0x224, 0x182030));

    renderer.setAnimationLoop(() => {
      meshes.forEach((m) => { m.rotation.y += 0.004; });
      controls.update();
      renderer.render(scene, cam);
    });
    addEventListener('resize', () => {
      cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
